---
services:
 opencode:
  build:
   dockerfile: Dockerfile
   additional_contexts:
    certs: ../../../certs/
  stdin_open: true  # docker run -i
  tty: true         # docker run -t
  volumes:
    - ./workspace:/workspace
  working_dir: /workspace
networks:
 default:
  enable_ipv6: true
  ipam:
   config:
    - subnet: 10.255.213.168/29
