---
services:
 nanoclaw:
  build:
   dockerfile: Dockerfile
   additional_contexts:
    certs: ../../../certs/
  stdin_open: true  # docker run -i
  tty: true         # docker run -t
  privileged: true  # for Docker on Docker
  env_file:
    - ./claude.env
  volumes:
    - ./workspace:/workspace
    - ./.claude/.credentials.json:/root/.claude/.credentials.json
    - ./.claude/.claude.json:/root/.claude.json
networks:
 default:
  ipam:
   config:
    - subnet: 10.255.190.168/29
