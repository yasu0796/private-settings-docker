---
services:
 python:
  build:
   dockerfile: Dockerfile
   additional_contexts:
    certs: ../../../certs/
  # command: pip list
  command: python ./sample.py
  volumes:
   - ./scripts:/scripts:ro
  working_dir: /scripts
networks:
 default:
  enable_ipv6: true
  ipam:
   config:
    - subnet: 10.255.52.152/29
